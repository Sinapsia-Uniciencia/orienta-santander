<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#f0f4ff"/>
<meta name="description" content="Estrategia Unificada 11 — Orientación Vocacional · Gobernación de Santander"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="OrientaSantander"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icons/icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<title>OrientaSantander</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:#f0f4ff;font-family:'Nunito',sans-serif;color:#1e2340;overscroll-behavior:none;font-size:16px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#c7d0f0;border-radius:2px}
input,textarea,button{font-family:'Nunito',sans-serif;font-size:15px}
button{cursor:pointer;border:none;background:none;color:inherit}
textarea{resize:vertical}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes popIn{0%{transform:scale(.4);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{0%{transform:translateY(20px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,.3)}50%{box-shadow:0 0 0 8px rgba(99,102,241,0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes splashLoad{0%{width:0%}100%{width:100%}}
#app{max-width:480px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}
#screen{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px}
#screen::-webkit-scrollbar{width:3px}
.screen-enter{animation:slideUp .3s ease}
/* Nav — modo día */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:rgba(255,255,255,.97);backdrop-filter:blur(16px);
  border-top:1px solid #dde3f8;box-shadow:0 -2px 16px rgba(99,102,241,.08);
  display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;border:none;background:transparent;padding:10px 2px 8px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  border-top:2px solid transparent;transition:all .2s;font-family:inherit}
.nav-btn.active{border-top-color:#6366f1;background:rgba(99,102,241,.04)}
.nav-btn .nav-icon{font-size:18px}
.nav-btn .nav-label{font-size:10px;color:#9ca3d4;font-weight:600;transition:color .2s}
.nav-btn.active .nav-label{color:#6366f1;font-weight:800}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
/* Cards */
.card{background:#fff;border:1px solid #dde3f8;border-radius:14px;padding:18px;
  box-shadow:0 1px 6px rgba(99,102,241,.06)}
/* Buttons */
.btn-primary{width:100%;padding:15px;border-radius:13px;font-weight:800;font-size:16px;
  transition:all .2s;border:none}
.btn-secondary{padding:11px 22px;border-radius:11px;font-weight:700;font-size:14px;
  background:#f3f4ff;border:1px solid #dde3f8;color:#6b7280;transition:all .2s}
.btn-secondary:active{background:#e8eaff}
/* Progress bar */
.pbar{height:6px;background:#e8eaff;border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.16,1,.3,1)}
/* Scale buttons */
.scale-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.scale-btn{background:#fff;border:1.5px solid #dde3f8;border-radius:14px;
  padding:14px 4px;display:flex;flex-direction:column;align-items:center;gap:5px;
  transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.scale-btn:active{transform:scale(.94);background:#f0f4ff}
.scale-btn .se{font-size:22px}
.scale-btn .sl{font-size:11px;color:#9ca3d4;font-weight:700}
/* Tags */
.tag{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;white-space:nowrap;display:inline-block}
/* Splash */
#splash{position:fixed;inset:0;background:linear-gradient(160deg,#f0f4ff 0%,#e8eeff 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;z-index:1000;transition:opacity .5s ease}
#splash.hidden{opacity:0;pointer-events:none}
.splash-logo{font-size:72px;animation:floatY 3s ease-in-out infinite;
  filter:drop-shadow(0 4px 24px rgba(99,102,241,.35))}
.splash-title{font-family:'Clash Display',sans-serif;font-size:28px;font-weight:700;
  background:linear-gradient(120deg,#6366f1,#10b981);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
.splash-sub{color:#6b7280;font-size:15px;text-align:center;line-height:1.6;max-width:280px}
.splash-gov{color:#9ca3af;font-size:13px;text-align:center;margin-top:8px;
  border-top:1px solid #dde3f8;padding-top:16px;width:260px;line-height:1.9}
.splash-bar{width:200px;height:4px;background:#dde3f8;border-radius:2px;overflow:hidden;margin-top:8px}
.splash-bar-fill{height:100%;background:linear-gradient(90deg,#6366f1,#10b981);
  border-radius:2px;animation:splashLoad 2.2s ease forwards}
</style>
</head>

<script>
/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
const STATE = {
  tab: 0,
  tests: null,      // {riasec, chaside}
  self: null,       // {soft, cognitive, reflection}
  future: null,     // {bienestar, proyecto}
  neuro: null,      // {fe,re,ar,mi}
  game: null,       // active game id
  gameRecords: JSON.parse(localStorage.getItem('gc_records')||'{}'),
  showCareers: false,
};

function saveRecords(){ localStorage.setItem('gc_records', JSON.stringify(STATE.gameRecords)); }

/* ═══════════════════════════════════════════════════
   ROUTER
═══════════════════════════════════════════════════ */
function goTab(t){
  if(t===4 && !STATE.tests?.riasec) return;
  STATE.tab = t;
  STATE.showCareers = false;
  updateNav();
  render();
}

function updateNav(){
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active', +b.dataset.tab === STATE.tab);
  });
  const p = document.getElementById('nav-perfil');
  if(p) p.disabled = !STATE.tests?.riasec;
  // Hide nav in game mode
  document.getElementById('nav').style.display = STATE.tab===6 ? 'none' : 'flex';
}

function render(){
  const s = document.getElementById('screen');
  s.scrollTop = 0;
  if(STATE.showCareers){ s.innerHTML = renderCareers(); bindCareers(); return; }
  const map = {0:renderHome,1:renderTests,2:renderSelf,3:renderFuture,4:renderProfile,5:renderNeuro,6:renderGym};
  const fn = map[STATE.tab];
  if(fn){ s.innerHTML = `<div class="screen-enter">${fn()}</div>`; bindScreen(STATE.tab); }
}

function pbar(val,color){
  return `<div class="pbar"><div class="pbar-fill" style="width:${val}%;background:${color}"></div></div>`;
}
function tag(label,color){
  return `<span class="tag" style="background:${color}20;color:${color};border:1px solid ${color}40">${label}</span>`;
}
function btn(label,color,onclick,extra=''){
  return `<button class="btn-primary" style="background:linear-gradient(135deg,${color},${color}cc);
    color:#fff;box-shadow:0 4px 14px ${color}33" onclick="${onclick}" ${extra}>${label}</button>`;
}
function moduleCard(icon,color,title,desc,onclick,done=false,locked=false){
  return `<button onclick="${locked?'':onclick}" style="background:${T.card};
    border:1.5px solid ${done?color+'66':T.border};border-left:4px solid ${done?color:T.border};
    border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:14px;
    width:100%;text-align:left;opacity:${locked?.35:1};transition:all .2s;
    box-shadow:0 1px 6px rgba(99,102,241,.06)"
    ${locked?'disabled':''}>
    <div style="width:46px;height:46px;border-radius:13px;background:${color}15;
      display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${icon}</div>
    <div style="flex:1">
      <div style="font-weight:800;font-size:15px;color:${T.text};margin-bottom:2px">${title}</div>
      <div style="font-size:13px;color:${T.muted}">${desc}</div>
    </div>
    <span style="font-size:${done?14:18}px;color:${done?color:T.muted};font-weight:800">${done?'✓':locked?'🔒':'›'}</span>
  </button>`;
}
function scaleButtons(onpick_fn){
  const opts=[{v:1,e:'😐',l:'Nada'},{v:2,e:'🙂',l:'Poco'},{v:3,e:'😊',l:'Algo'},{v:4,e:'😄',l:'Bastante'},{v:5,e:'🤩',l:'Mucho'}];
  return `<div class="scale-grid">${opts.map(o=>`
    <button class="scale-btn" onclick="${onpick_fn}(${o.v})">
      <span class="se">${o.e}</span><span class="sl">${o.l}</span>
    </button>`).join('')}</div>`;
}
function questionCard(text){
  return `<div style="background:linear-gradient(135deg,#f8f9ff,#f0f4ff);
    border:1.5px solid ${T.border};border-radius:18px;
    padding:26px 22px;margin-bottom:22px;min-height:90px;
    display:flex;align-items:center;box-shadow:0 2px 10px rgba(99,102,241,.07)">
    <p style="font-size:17px;color:${T.text};line-height:1.65;margin:0;font-weight:600;
      font-family:'Clash Display',sans-serif">${text}</p>
  </div>`;
}
function backBtn(label='← Volver',onclick='goBack()'){
  return `<button onclick="${onclick}" style="background:transparent;border:none;
    color:${T.muted};font-size:14px;margin-bottom:16px;padding:4px 0;
    font-family:inherit;font-weight:700">${label}</button>`;
}
function sectionHeader(title,sub=''){
  return `<div style="margin-bottom:22px">
    <h2 style="font-family:'Clash Display',sans-serif;font-size:22px;font-weight:700;
      color:${T.text};margin:0 0 5px">${title}</h2>
    ${sub?`<p style="color:${T.muted};font-size:14px;margin:0">${sub}</p>`:''}
  </div>`;
}

let TEST_STATE={q:[],cur:0,ans:{},skillKey:'',onDone:null,color:'',title:'',icon:''};

function startTest(questions,skillKey,color,title,icon,onDone){
  TEST_STATE={q:questions,cur:0,ans:{},skillKey,onDone,color,title,icon};
  renderTest();
}

function renderTest(){
  const {q,cur,color,title,icon}=TEST_STATE;
  const pct=Math.round(((cur+1)/q.length)*100);
  document.getElementById('screen').innerHTML=`<div class="screen-enter" style="padding:24px 20px">
    ${backBtn('← Volver','goBack()')}
    <h3 style="font-family:'Clash Display',sans-serif;font-size:18px;font-weight:700;color:${T.text};margin:0 0 18px">${icon} ${title}</h3>
    <div style="margin-bottom:22px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:13px;color:${T.muted};font-weight:700">Pregunta ${cur+1} de ${q.length}</span>
        <span style="font-size:13px;color:${color};font-weight:800">${pct}%</span>
      </div>
      ${pbar(pct,color)}
    </div>
    ${questionCard(q[cur].text)}
    <p style="font-size:14px;color:${T.muted};text-align:center;margin-bottom:14px;font-weight:600">¿Qué tanto te describe?</p>
    ${scaleButtons('pickTest')}
    ${cur>0?`<button onclick="prevTest()" style="background:transparent;border:none;color:${T.muted};font-size:14px;margin-top:16px;font-family:inherit;font-weight:700">← Pregunta anterior</button>`:''}
  </div>`;
}

function pickTest(v){
  const {q,cur,ans,skillKey}=TEST_STATE;
  const qItem=q[cur];
  TEST_STATE.ans={...ans,[qItem.id]:{[skillKey]:qItem[skillKey],v}};
  if(cur<q.length-1){TEST_STATE.cur++;renderTest();}
  else{
    const scores={};
    Object.values(TEST_STATE.ans).forEach(a=>{scores[a[skillKey]]=(scores[a[skillKey]]||0)+a.v;});
    TEST_STATE.onDone(scores);
  }
}
function prevTest(){if(TEST_STATE.cur>0){TEST_STATE.cur--;renderTest();}}

function renderTestResult(scores,infoMap,title,onBack){
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const max=sorted[0][1];
  const topKey=sorted[0][0];
  const topInfo=infoMap[topKey];
  let html=`<div class="screen-enter" style="padding:24px 20px">
    ${backBtn('← Volver',onBack)}
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:38px;margin-bottom:8px">${topInfo.icon}</div>
      <h3 style="font-family:'Clash Display',sans-serif;font-size:17px;font-weight:700;color:${T.text};margin:0 0 4px">Resultados: ${title}</h3>
    </div>
    <div style="background:${topInfo.color}18;border:1px solid ${topInfo.color}44;border-radius:14px;padding:18px;margin-bottom:18px;text-align:center">
      <div style="font-size:30px;margin-bottom:6px">${topInfo.icon}</div>
      <div style="font-weight:800;font-size:15px;color:${topInfo.color}">${topInfo.name}</div>
      <div style="font-size:13px;color:${T.soft};margin-top:4px">${topInfo.desc}</div>
      ${topInfo.careers?`<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:5px;justify-content:center">${topInfo.careers.map(c=>tag(c,topInfo.color)).join('')}</div>`:''}
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">`;
  sorted.forEach(([k,v])=>{
    const info=infoMap[k];
    const pct2=Math.round((v/max)*100);
    html+=`<div>
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:13px;color:${T.text};font-weight:600">${info.icon} ${info.name}</span>
        <span style="font-size:12px;color:${T.muted}">${v}pts</span>
      </div>
      ${pbar(pct2,info.color)}
      <div style="font-size:11px;color:${T.muted};margin-top:3px">${info.desc}</div>
    </div>`;
  });
  html+=`</div></div>`;
  return html;
}

let TESTS_VIEW='menu'; // menu | riasec | chaside | riasec_result | chaside_result

function renderTests(){
  TESTS_VIEW='menu';
  return renderTestsMenu();
}
function renderTestsMenu(){
  const r=STATE.tests?.riasec, c=STATE.tests?.chaside;
  return `<div style="padding:24px 20px">
    ${sectionHeader('🧪 Tests Vocacionales','Dos instrumentos complementarios para conocer tus intereses')}
    <!-- RIASEC -->
    <div style="background:${T.card};border:1px solid ${r?T.p1+'55':T.border};border-radius:16px;padding:18px;margin-bottom:12px">
      <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:14px">
        <div style="width:48px;height:48px;border-radius:12px;background:${T.p1}18;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">🔬</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:15px;color:${T.text};margin-bottom:2px">Test RIASEC</div>
          <div style="font-size:12px;color:${T.muted};line-height:1.5">Basado en Holland. 6 tipos de personalidad vocacional. 18 preguntas · ~4 min</div>
        </div>
      </div>
      ${r?`<div style="background:${T.bg};border-radius:10px;padding:10px 14px;margin-bottom:12px">
        <div style="font-size:11px;color:${T.muted};margin-bottom:6px">Tu código RIASEC:</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">${Object.entries(r).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([t])=>`<span style="font-size:12px;font-weight:700;color:${RI[t].color};background:${RI[t].color}15;padding:3px 10px;border-radius:8px">${RI[t].icon} ${RI[t].name}</span>`).join('')}</div>
      </div>`:''}
      <button onclick="startRiasec()" style="width:100%;padding:12px;border-radius:10px;border:1px solid ${T.p1}44;background:${r?T.p1+'15':T.p1};color:${r?T.p1:'#fff'};font-weight:700;font-size:13px;font-family:inherit;transition:all .2s">${r?'Ver resultados / Repetir':'Comenzar test →'}</button>
    </div>
    <!-- CHASIDE -->
    <div style="background:${T.card};border:1px solid ${c?'#a78bfa55':T.border};border-radius:16px;padding:18px;margin-bottom:20px">
      <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:14px">
        <div style="width:48px;height:48px;border-radius:12px;background:#a78bfa18;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">🗺️</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:15px;color:${T.text};margin-bottom:2px">Test CHASIDE</div>
          <div style="font-size:12px;color:${T.muted};line-height:1.5">Instrumento oficial Estrategia Unificada 11 · 7 áreas vocacionales · 14 preguntas · ~3 min</div>
        </div>
      </div>
      ${c?`<div style="background:${T.bg};border-radius:10px;padding:10px 14px;margin-bottom:12px">
        <div style="font-size:11px;color:${T.muted};margin-bottom:6px">Tu área dominante:</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">${Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([a])=>`<span style="font-size:12px;font-weight:700;color:${CI[a].color};background:${CI[a].color}15;padding:3px 10px;border-radius:8px">${CI[a].icon} ${CI[a].name}</span>`).join('')}</div>
      </div>`:''}
      <button onclick="startChaside()" style="width:100%;padding:12px;border-radius:10px;border:1px solid #a78bfa44;background:${c?'#a78bfa15':'#a78bfa'};color:${c?'#a78bfa':'#fff'};font-weight:700;font-size:13px;font-family:inherit;transition:all .2s">${c?'Ver resultados / Repetir':'Comenzar test →'}</button>

    </div>`:''}
  </div>`;
}
function startRiasec(){
  startTest(RIASEC_Q,'type',T.p1,'Test RIASEC','🔬',(scores)=>{
    STATE.tests={...STATE.tests||{},riasec:scores};
    updateNav();
    document.getElementById('screen').innerHTML=renderTestResult(scores,RI,'Test RIASEC','renderTests_menu()');
  });
}
function startChaside(){
  startTest(CHASIDE_Q,'area','#a78bfa','Test CHASIDE','🗺️',(scores)=>{
    STATE.tests={...STATE.tests||{},chaside:scores};
    document.getElementById('screen').innerHTML=renderTestResult(scores,CI,'Test CHASIDE','renderTests_menu()');
  });
}
function renderTests_menu(){
  document.getElementById('screen').innerHTML=`<div class="screen-enter">${renderTestsMenu()}</div>`;
}
function goBack(){
  render(); // re-render current tab
}

/* Reflection flow */
function startReflection(){
  REFL_STEP=0; REFL_DATA=STATE.self?.reflection||{};
  SEL_VALUES=REFL_DATA.valores||[]; SEL_STRENGTHS=REFL_DATA.fortalezas||[];
  SEL_FEARS=REFL_DATA.miedos||{}; PHRASE_VALS=REFL_DATA.motivaciones||{};
  renderReflStep();
}
function renderReflStep(){
  const r=REFLECTIONS[REFL_STEP];
  const bars=REFLECTIONS.map((_,i)=>`<div style="flex:1;height:3px;border-radius:2px;background:${i<=REFL_STEP?r.color:T.border};transition:background .3s"></div>`).join('');
  let content='';
  if(r.type==='select3') content=renderSelect3(r);
  else if(r.type==='phrases') content=renderPhrases(r);
  else if(r.type==='cards') content=renderCards(r);
  else if(r.type==='acknowledge') content=renderAcknowledge(r);
  document.getElementById('screen').innerHTML=`<div class="screen-enter" style="padding:24px 20px">
    ${backBtn('← Volver','renderSelfMenu_()')}
    <div style="display:flex;gap:5px;margin-bottom:18px">${bars}</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
      <div style="width:42px;height:42px;border-radius:12px;background:${r.color}18;display:flex;align-items:center;justify-content:center;font-size:22px">${r.icon}</div>
      <div>
        <div style="font-weight:700;font-size:15px;color:${T.text}">${r.title}</div>
        <div style="font-size:12px;color:${T.muted}">${r.instruction}</div>
      </div>
    </div>
    ${content}
  </div>`;
}
function renderSelect3(r){
  return `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">${r.options.map(o=>`
    <button onclick="toggleVal('${o}')" id="val_${o.replace(/\s/g,'_')}" style="padding:8px 14px;border-radius:20px;border:1px solid ${SEL_VALUES.includes(o)?r.color:T.border};background:${SEL_VALUES.includes(o)?r.color+'22':T.card};color:${SEL_VALUES.includes(o)?r.color:T.soft};font-size:13px;font-weight:${SEL_VALUES.includes(o)?700:400};font-family:inherit;transition:all .15s">${o}</button>`).join('')}
  </div>
  <div style="font-size:12px;color:${T.muted};margin-bottom:12px">Seleccionados: ${SEL_VALUES.length}/3</div>
  <button onclick="saveReflStep()" style="width:100%;padding:13px;border-radius:12px;border:none;background:${SEL_VALUES.length>0?r.color:T.border};color:${SEL_VALUES.length>0?'#fff':T.muted};font-weight:700;font-size:14px;font-family:inherit">Continuar →</button>`;
}
function toggleVal(v){
  if(SEL_VALUES.includes(v)) SEL_VALUES=SEL_VALUES.filter(x=>x!==v);
  else if(SEL_VALUES.length<3) SEL_VALUES.push(v);
  renderReflStep();
}
function renderPhrases(r){
  return `${r.phrases.map(p=>`
    <div style="margin-bottom:14px">
      <label style="font-size:13px;color:${T.soft};display:block;margin-bottom:6px">${p.prompt}</label>
      <input id="ph_${p.id}" value="${PHRASE_VALS[p.id]||''}" placeholder="${p.ph}" oninput="PHRASE_VALS['${p.id}']=this.value" style="width:100%;padding:12px 14px;border-radius:10px;background:${T.card};border:1px solid ${T.border};color:${T.text};font-size:13px;outline:none;font-family:inherit;box-sizing:border-box"/>
    </div>`).join('')}
  <button onclick="saveReflStep()" style="width:100%;padding:13px;border-radius:12px;border:none;background:${r.color};color:#fff;font-weight:700;font-size:14px;font-family:inherit;margin-top:4px">Continuar →</button>`;
}
function renderCards(r){
  return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">${r.options.map(o=>{
    const on=SEL_STRENGTHS.some(x=>x.label===o.label);
    return `<button onclick="toggleStrength('${o.label}','${o.icon}')" style="padding:12px 10px;border-radius:12px;border:1px solid ${on?r.color:T.border};background:${on?r.color+'22':T.card};display:flex;align-items:center;gap:8px;font-family:inherit;transition:all .15s;text-align:left">
      <span style="font-size:18px">${o.icon}</span>
      <span style="font-size:12px;color:${on?r.color:T.soft};font-weight:${on?700:400}">${o.label}</span>
    </button>`;
  }).join('')}</div>
  <button onclick="saveReflStep()" style="width:100%;padding:13px;border-radius:12px;border:none;background:${SEL_STRENGTHS.length>0?r.color:T.border};color:${SEL_STRENGTHS.length>0?'#fff':T.muted};font-weight:700;font-size:14px;font-family:inherit">Continuar →</button>`;
}
function toggleStrength(label,icon){
  if(SEL_STRENGTHS.some(x=>x.label===label)) SEL_STRENGTHS=SEL_STRENGTHS.filter(x=>x.label!==label);
  else SEL_STRENGTHS.push({label,icon});
  renderReflStep();
}
function renderAcknowledge(r){
  return `<p style="font-size:13px;color:${T.soft};line-height:1.6;margin-bottom:14px">Reconocer tus miedos no significa que te dominen — significa que los ves con claridad:</p>
  ${r.fears.map(f=>`<button onclick="toggleFear('${f.id}')" style="width:100%;text-align:left;padding:12px 16px;border-radius:12px;margin-bottom:8px;border:1px solid ${SEL_FEARS[f.id]?r.color+'66':T.border};background:${SEL_FEARS[f.id]?r.color+'15':T.card};display:flex;align-items:center;gap:12px;font-family:inherit;transition:all .15s">
    <div style="width:20px;height:20px;border-radius:6px;border:1px solid ${SEL_FEARS[f.id]?r.color:T.muted};background:${SEL_FEARS[f.id]?r.color:'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;color:#fff">${SEL_FEARS[f.id]?'✓':''}</div>
    <span style="font-size:13px;color:${SEL_FEARS[f.id]?T.text:T.soft}">${f.text}</span>
  </button>`).join('')}
  <button onclick="saveReflStep()" style="width:100%;padding:13px;border-radius:12px;border:none;background:${r.color};color:#fff;font-weight:700;font-size:14px;font-family:inherit;margin-top:8px">Finalizar módulo →</button>`;
}
function toggleFear(id){SEL_FEARS[id]=!SEL_FEARS[id];renderReflStep();}
function saveReflStep(){
  const r=REFLECTIONS[REFL_STEP];
  if(r.type==='select3') REFL_DATA.valores=SEL_VALUES;
  else if(r.type==='phrases') REFL_DATA.motivaciones={...PHRASE_VALS};
  else if(r.type==='cards') REFL_DATA.fortalezas=SEL_STRENGTHS;
  else if(r.type==='acknowledge') REFL_DATA.miedos={...SEL_FEARS};
  if(REFL_STEP<REFLECTIONS.length-1){REFL_STEP++;renderReflStep();}
  else{
    SELF_RESULTS.reflection=REFL_DATA;
    STATE.self={...STATE.self||{},...SELF_RESULTS};
    document.getElementById('screen').innerHTML=`<div class="screen-enter" style="padding:24px 20px">
      ${backBtn('← Volver','renderSelfMenu_()')}
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:40px;margin-bottom:8px">🌱</div>
        <h3 style="font-family:'Clash Display',sans-serif;font-size:17px;font-weight:700;color:${T.text};margin:0 0 4px">Autoconocimiento completado</h3>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${REFLECTIONS.map(r=>`<div style="background:${T.card};border:1px solid ${r.color}33;border-left:3px solid ${r.color};border-radius:12px;padding:13px 16px">
          <div style="font-weight:700;font-size:13px;color:${r.color};margin-bottom:4px">${r.icon} ${r.title}</div>
          <div style="font-size:12px;color:${T.soft};line-height:1.6">${
            r.type==='select3'?(REFL_DATA.valores||[]).join(' · ')
            :r.type==='phrases'?r.phrases.map(p=>`<div><span style="color:${T.muted}">${p.prompt} </span><span style="color:${T.text}">${(REFL_DATA.motivaciones||{})[p.id]||'—'}</span></div>`).join('')
            :r.type==='cards'?(REFL_DATA.fortalezas||[]).map(f=>f.label).join(' · ')
            :REFLECTIONS[3].fears.filter(f=>(REFL_DATA.miedos||{})[f.id]).map(f=>f.text).join(' | ')||'Ninguno seleccionado'
          }</div>
        </div>`).join('')}
      </div>
    </div>`;
  }
}

/* Bienestar */
function startBienestar(){BIEN_DIM=0;BIEN_Q=0;BIEN_ANS={};renderBienestar();}
function renderBienestar(){
  const dim=BIENESTAR[BIEN_DIM];
  const totalQ=BIENESTAR.reduce((s,d)=>s+d.q.length,0);
  const doneQ=BIENESTAR.slice(0,BIEN_DIM).reduce((s,d)=>s+d.q.length,0)+BIEN_Q;
  const pct=Math.round((doneQ/totalQ)*100);
  document.getElementById('screen').innerHTML=`<div class="screen-enter" style="padding:24px 20px">
    ${backBtn('← Volver','renderFuturoMenu_()')}
    <h3 style="font-family:'Clash Display',sans-serif;font-size:16px;font-weight:700;color:${T.text};margin:0 0 14px">💛 Mapa de Bienestar</h3>
    <div style="margin-bottom:20px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;color:${T.muted}">${dim.icon} ${dim.name} · ${BIEN_Q+1}/${dim.q.length}</span>
        <span style="font-size:12px;color:#facc15;font-weight:700">${pct}%</span>
      </div>
      ${pbar(pct,'#facc15')}
    </div>
    ${questionCard(dim.q[BIEN_Q])}
    <p style="font-size:12px;color:${T.muted};text-align:center;margin-bottom:12px">¿Qué tanto describes tu situación actual?</p>
    ${scaleButtons('pickBienestar')}
  </div>`;
}
function pickBienestar(v){
  const dim=BIENESTAR[BIEN_DIM];
  BIEN_ANS[`${dim.id}_${BIEN_Q}`]=v;
  if(BIEN_Q<dim.q.length-1){BIEN_Q++;renderBienestar();}
  else if(BIEN_DIM<BIENESTAR.length-1){BIEN_DIM++;BIEN_Q=0;renderBienestar();}
  else{
    const scores={};
    BIENESTAR.forEach(d=>{
      const total=d.q.reduce((acc,_,i)=>(BIEN_ANS[`${d.id}_${i}`]||0)+acc,0);
      scores[d.id]=Math.round((total/(d.q.length*5))*100);
    });
    STATE.future={...STATE.future||{},bienestar:scores};
    renderBienestarResult(scores);
  }
}
function renderBienestarResult(scores){
  const getCol=v=>v>=70?T.p2:v>=45?'#facc15':T.p3;
  document.getElementById('screen').innerHTML=`<div class="screen-enter" style="padding:24px 20px">
    ${backBtn('← Volver','renderFuturoMenu_()')}

    </div>
    <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:16px">
      ${BIENESTAR.map(d=>{
        const v=scores[d.id]||0;const col=getCol(v);
        return `<div style="background:${T.card};border:1px solid ${col}33;border-radius:14px;padding:14px 16px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span style="font-size:13px;font-weight:700;color:${T.text}">${d.icon} ${d.name}</span>
            <span style="font-size:13px;font-weight:800;color:${col}">${v}%</span>
          </div>
          ${pbar(v,col)}
          <div style="font-size:11px;color:${T.muted};margin-top:5px">${v>=70?'✓ Área fortalecida':v>=45?'⚡ Área en desarrollo':'⚠️ Área que merece atención'}</div>
        </div>`;
      }).join('')}
    </div>
    <div style="background:${T.card};border:1px solid ${T.border};border-radius:14px;padding:14px">
      <div style="font-size:12px;color:${T.muted};margin-bottom:6px">💡 Recuerda</div>
      <p style="font-size:13px;color:${T.soft};margin:0;line-height:1.6">Este mapa refleja tu momento actual, no tu destino. Las áreas en rojo no te limitan — te dicen dónde poner atención antes de tomar grandes decisiones.</p>
    </div>
  </div>`;
}

  const bars=PROYECTO_STEPS.map((_,i)=>`<div style="flex:1;height:3px;border-radius:2px;background:${i<=PROY_STEP?s.color:T.border};transition:background .3s"></div>`).join('');

    >${PROY_DATA[s.id]||''}</textarea>
    <div style="display:flex;gap:10px;margin-top:12px">
      ${PROY_STEP>0?`<button onclick="prevProy()" style="flex:1;padding:13px;border-radius:12px;border:1px solid ${T.border};background:transparent;color:${T.muted};font-weight:600;font-size:13px;font-family:inherit">← Anterior</button>`:''}
      <button onclick="nextProy()" style="flex:2;padding:13px;border-radius:12px;border:none;background:${s.color};color:#fff;font-weight:700;font-size:14px;font-family:inherit">${PROY_STEP===PROYECTO_STEPS.length-1?'Finalizar ✓':'Continuar →'}</button>

  </div>`;
  const ta=document.getElementById('proy_input');
  if(ta){ta.addEventListener('focus',()=>ta.style.borderColor=s.color);ta.addEventListener('blur',()=>ta.style.borderColor=T.border);}

function nextProy(){
  const s=PROYECTO_STEPS[PROY_STEP];
  const ta=document.getElementById('proy_input');
  if(ta) PROY_DATA[s.id]=ta.value;
  if(PROY_STEP<PROYECTO_STEPS.length-1){PROY_STEP++;renderProyecto();}

    STATE.future={...STATE.future||{},proyecto:PROY_DATA};
    renderFuturoMenu_();

function prevProy(){
  const ta=document.getElementById('proy_input');
  if(ta) PROY_DATA[PROYECTO_STEPS[PROY_STEP].id]=ta.value;
  if(PROY_STEP>0){PROY_STEP--;renderProyecto();}
}

function runCorsi(){
  const lvl=GYM_STATE.level;
  const seq=Array.from({length:lvl},()=>rand(0,8)); // grilla 3x3
  GYM_STATE.data={seq,input:[],lit:-1};

async function showCorsi(seq){
  GYM_STATE.phase='showing';renderCorsiBoard();
  await sleep(600);
  for(let i=0;i<seq.length;i++){
    GYM_STATE.data.lit=seq[i];renderCorsiBoard();await sleep(700);
    GYM_STATE.data.lit=-1;renderCorsiBoard();await sleep(400);
  }
  GYM_STATE.phase='input';GYM_STATE.data.input=[];renderCorsiBoard();
}
function renderCorsiBoard(){
  const {seq,lit,input}=GYM_STATE.data;
  const {phase,score,errors,level}=GYM_STATE;
  const g=GAMES_DATA[0];
  // 3x3 grid — bloques grandes para móvil
  const blocks=Array.from({length:9},(_,i)=>{
    const isLit=lit===i;
    const isSel=input.includes(i);
    return `<button onclick="tapCorsi(${i})"
      style="aspect-ratio:1;width:100%;border-radius:14px;
      border:3px solid ${isLit?g.color:isSel?g.color+'99':'#2a2a4a'};
      background:${isLit?g.color:isSel?g.color+'33':'#1a1a35'};
      box-shadow:${isLit?'0 0 28px '+g.color+', 0 0 8px '+g.color+'88':'none'};
      transition:all .15s;cursor:${phase==='input'?'pointer':'default'};
      font-size:0"></button>`;
  }).join('');
  const status=phase==='showing'?`<div style="text-align:center;margin-bottom:14px"><span style="font-size:13px;color:${g.color};font-weight:700;background:${g.color}18;padding:6px 16px;border-radius:20px">👀 Memoriza la secuencia</span></div>`
    :phase==='input'?`<div style="text-align:center;margin-bottom:14px"><span style="font-size:13px;color:#f1f5f9;font-weight:700;background:#1e1e3f;padding:6px 16px;border-radius:20px">👆 Toca en orden: ${input.length}/${seq.length}</span></div>`:'';
  document.getElementById('screen').innerHTML=gymShell(g.name,g.color,score,errors,3,level,`Secuencia: ${level} bloques`,
    `${status}<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:300px;margin:0 auto;padding:8px">${blocks}</div>`);
}
function tapCorsi(i){
  if(GYM_STATE.phase!=='input')return;
  const {seq,input}=GYM_STATE.data;
  const newInput=[...input,i];
  GYM_STATE.data.input=newInput;
  const pos=newInput.length-1;
  if(newInput[pos]!==seq[pos]){
    GYM_STATE.errors++;
    renderCorsiBoard();
    if(GYM_STATE.errors>=3){setTimeout(()=>finishGame(GYM_STATE.score),800);return;}
    GYM_STATE.level=Math.max(2,GYM_STATE.level-1);
    setTimeout(()=>runCorsi(),1000);
  } else if(newInput.length===seq.length){
    GYM_STATE.score+=GYM_STATE.level*10;
    GYM_STATE.level++;
    renderCorsiBoard();
    setTimeout(()=>runCorsi(),700);
  } else {
    renderCorsiBoard();
  }
}

/* ── MATRICES DE RAVEN ── Razonamiento fluido */
// Generamos matrices 2x2→3x3 con patrones de símbolos, colores y rotaciones
const RAVEN_SYMBOLS=['●','■','▲','★','◆','✦','⬟','⬡'];
const RAVEN_COLORS=['#a78bfa','#22d3ee','#f472b6','#4ade80','#fbbf24','#fb923c'];

function makeRavenPuzzle(size){
  // Patrón: cada fila incrementa el símbolo, cada columna incrementa el color
  const syms=shuffle([...RAVEN_SYMBOLS]).slice(0,size);
  const cols=shuffle([...RAVEN_COLORS]).slice(0,size);
  const grid=[];
  for(let r=0;r<size;r++){
    for(let c=0;c<size;c++){
      grid.push({sym:syms[r],col:cols[c]});
    }
  }
  return {grid,size,answerIdx:grid.length-1,answer:grid[grid.length-1]};
}

function makeRavenOptions(correct,size){
  const wrong=[];
  const syms=shuffle([...RAVEN_SYMBOLS]).filter(s=>s!==correct.sym);
  const cols=shuffle([...RAVEN_COLORS]).filter(c=>c!==correct.col);
  // 3 distractores
  wrong.push({sym:syms[0],col:correct.col}); // mismo color, distinto símbolo
  wrong.push({sym:correct.sym,col:cols[0]}); // mismo símbolo, distinto color
  wrong.push({sym:syms[1],col:cols[1]});     // ambos distintos
  return shuffle([correct,...wrong]);
}

function runMatricesRaven(){
  const size=GYM_STATE.level<=3?2:3;
  const puzzle=makeRavenPuzzle(size);
  const opts=makeRavenOptions(puzzle.answer,size);
  GYM_STATE.data={puzzle,opts,answered:false};
  renderMatricesRaven();
}

function answerRaven(optIdx){

/* ── MATRICES VISOESPACIALES ── Memoriza y reproduce */
const VISO_COLORS=['#a78bfa','#22d3ee','#f472b6','#4ade80','#fbbf24'];

function runMatricesViso(){
  const size=GYM_STATE.level<=2?2:GYM_STATE.level<=4?3:4;
  const total=size*size;
  // Generar patrón: algunas celdas coloreadas
  const filled=Math.ceil(total*0.5);
  const pattern=Array(total).fill(null);
  const positions=shuffle([...Array(total).keys()]).slice(0,filled);
  positions.forEach(p=>{pattern[p]=VISO_COLORS[rand(0,VISO_COLORS.length-1)];});
  GYM_STATE.data={pattern,size,phase:'show',userGrid:Array(total).fill(null),activeColor:VISO_COLORS[0]};
  renderMatricesViso();
  // Mostrar 2.5 segundos luego esconder
  setTimeout(()=>{
    GYM_STATE.data.phase='input';
    GYM_STATE.data.userGrid=Array(total).fill(null);
    renderMatricesViso();
  }, 2500);
}

function renderMatricesViso(){
  const {pattern,size,phase,userGrid,activeColor}=GYM_STATE.data;
  const {score,errors,level}=GYM_STATE;
  const g=GAMES_DATA.find(x=>x.id==='matrices_v');
  const cellPx=size===2?'110px':size===3?'82px':'60px';
  const isShow=phase==='show';

  const cells=(isShow?pattern:userGrid).map((col,i)=>`
    <button onclick="${isShow?'':('paintCell('+i+')')}"
      style="width:${cellPx};height:${cellPx};border-radius:10px;
      background:${col||'#1a1a35'};
      border:2px solid ${col?'transparent':'#2a2a4a'};
      transition:all .2s;cursor:${isShow?'default':'pointer'}"
      onmousedown="${isShow?'':'this.style.transform=\'scale(.93)\''}"
      onmouseup="${isShow?'':'this.style.transform=\'scale(1)\''}"
    ></button>`).join('');

  const palette=isShow?'':`
    <div style="margin-top:16px">
      <p style="font-size:12px;color:#8b8db8;margin-bottom:10px">Color activo → toca las celdas</p>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px">
        ${VISO_COLORS.map(c=>`<button onclick="GYM_STATE.data.activeColor='${c}';renderMatricesViso()"
          style="width:36px;height:36px;border-radius:50%;background:${c};
          border:3px solid ${activeColor===c?'#fff':'transparent'};
          box-shadow:${activeColor===c?'0 0 10px '+c:'none'};transition:all .15s"></button>`).join('')}
        <button onclick="GYM_STATE.data.activeColor=null;renderMatricesViso()"
          style="width:36px;height:36px;border-radius:50%;background:#1a1a35;
          border:3px solid ${!activeColor?'#fff':'#2a2a4a'};font-size:16px;color:#8b8db8">✕</button>
      </div>
      <button onclick="submitViso()" style="padding:12px 32px;border-radius:12px;border:none;
        background:linear-gradient(135deg,${g.color}cc,${g.color}88);color:#fff;
        font-weight:800;font-size:15px;font-family:inherit;box-shadow:0 0 20px ${g.color}44">Confirmar ✓</button>
    </div>`;

  document.getElementById('screen').innerHTML=gymShell(g.name,g.color,score,errors,3,level,
    isShow?'👀 Memoriza el patrón...':'🎨 Reproduce el patrón',
    `<div style="text-align:center">
      <div style="display:grid;grid-template-columns:repeat(${size},${cellPx});gap:8px;justify-content:center;margin-bottom:4px">
        ${cells}
      </div>
      ${palette}
    </div>`);
}

function paintCell(i){
  GYM_STATE.data.userGrid[i]=GYM_STATE.data.activeColor;
  renderMatricesViso();
}

function submitViso(){
  const {pattern,userGrid}=GYM_STATE.data;
  let hits=0;
  pattern.forEach((col,i)=>{if(col===userGrid[i])hits++;});
  const pct=Math.round((hits/pattern.length)*100);
  const ok=pct>=70;
  if(ok){
    GYM_STATE.score+=GYM_STATE.level*15+Math.round(pct/10);
    GYM_STATE.level++;
    showFbAndNext(`✅ ${pct}% correcto`,()=>runMatricesViso());
  } else {
    GYM_STATE.errors++;
    if(GYM_STATE.errors>=3){showFbAndNext(`❌ ${pct}% correcto`,()=>finishGame(GYM_STATE.score));return;}
    showFbAndNext(`❌ Solo ${pct}% — inténtalo de nuevo`,()=>runMatricesViso());
  }
}

/* ── PALABRAS ── versión mejorada */
function runPalabras(){
  const lvl=GYM_STATE.level;
  const words=shuffle(WORDS_POOL).slice(0,lvl);
  GYM_STATE.data={words,shown:'',opts:[],sel:[],phase:'showing'};
  GYM_STATE.phase='showing';
  renderPalabras();
  (async()=>{
    for(const w of words){
      GYM_STATE.data.shown=w;renderPalabras();await sleep(1000);
      GYM_STATE.data.shown='';renderPalabras();await sleep(400);
    }
    const dist=shuffle(WORDS_POOL.filter(x=>!words.includes(x))).slice(0,Math.min(lvl+2,8));
    GYM_STATE.data.opts=shuffle([...words,...dist]);
    GYM_STATE.phase='input';renderPalabras();
  })();
}
function renderPalabras(){
  const {words,shown,opts,sel}=GYM_STATE.data;
  const {phase,score,errors,level}=GYM_STATE;
  const g=GAMES_DATA[2];
  const content=phase==='showing'
    ?`<div style="text-align:center;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center">

    :`<div style="text-align:center">

        <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px">
          ${opts.map(w=>`<button onclick="toggleWord('${w}')"
            style="padding:10px 18px;border-radius:20px;font-size:14px;

        <button onclick="submitPalabras()" ${sel.length!==words.length?'disabled':''}
          style="padding:13px 36px;border-radius:12px;border:none;

}
function toggleWord(w){
  const s=GYM_STATE.data.sel;
  GYM_STATE.data.sel=s.includes(w)?s.filter(x=>x!==w):[...s,w];renderPalabras();
}
function submitPalabras(){
  const {words,sel}=GYM_STATE.data;
  const ok=words.every(w=>sel.includes(w))&&sel.length===words.length;
  if(ok){GYM_STATE.score+=GYM_STATE.level*15;GYM_STATE.level++;setTimeout(()=>runPalabras(),500);}
  else{GYM_STATE.errors++;if(GYM_STATE.errors>=3){finishGame(GYM_STATE.score);return;}GYM_STATE.level=Math.max(3,GYM_STATE.level-1);setTimeout(()=>runPalabras(),500);}
}

function startGoNogo(){GYM_STATE.data.running=true;GYM_STATE.data.trial=0;goNoGoTrial();}
async function goNoGoTrial(){
  const TOTAL=20;if(GYM_STATE.data.trial>=TOTAL){showGoNogoResult();return;}

  const sym=isGo?'🟢':GO_DECOYS[rand(0,GO_DECOYS.length-1)];

  GYM_STATE.data.stim='';renderGoNogo();await sleep(400);
  GYM_STATE.data.trial++;goNoGoTrial();

function tapGoNogo(){
  if(!GYM_STATE.data.stim)return;
  GYM_STATE.data.responded=true;
  if(GYM_STATE.data.isGo){GYM_STATE.data.hits++;GYM_STATE.score+=10;GYM_STATE.data.fb='✅';}
  else{GYM_STATE.data.fas++;GYM_STATE.score=Math.max(0,GYM_STATE.score-5);GYM_STATE.data.fb='❌';}

}

const RC_CARDS=[{sym:"🔴",cat:{color:"left",shape:"right",size:"left"}},{sym:"🟡",cat:{color:"left",shape:"right",size:"left"}},{sym:"🔵",cat:{color:"right",shape:"right",size:"left"}},{sym:"⬛",cat:{color:"right",shape:"left",size:"left"}},{sym:"🔷",cat:{color:"right",shape:"right",size:"right"}},{sym:"⭐",cat:{color:"left",shape:"left",size:"right"}}];
const RC_RULES=[{id:"color",label:"Color",inst:"Izq=rojo/amarillo · Der=azul/negro"},{id:"shape",label:"Forma",inst:"Izq=cuadrado/estrella · Der=círculo/diamante"},{id:"size",label:"Tipo",inst:"Izq=figuras sólidas · Der=figuras vacías"}];
function runRegla(){GYM_STATE.data={rule:0,streak:0,trial:0,card:null,showRule:true,fb:''};GYM_STATE.score=0;GYM_STATE.errors=0;nextReglaCard();}
function nextReglaCard(){GYM_STATE.data.card=RC_CARDS[rand(0,RC_CARDS.length-1)];renderRegla();}
function renderRegla(){
  const {rule,streak,trial,card,showRule,fb}=GYM_STATE.data;const {score,errors}=GYM_STATE;const g=GAMES_DATA[4];const r=RC_RULES[rule];const TOTAL=24;
  const content=showRule
    ?`<div style="background:${g.color}18;border:1px solid ${g.color}44;border-radius:12px;padding:12px 16px;margin-bottom:14px;text-align:center">
      <div style="font-size:12px;color:${g.color};font-weight:700;margin-bottom:4px">🔄 Regla: ${r.label}</div>
      <div style="font-size:12px;color:#8b8db8">${r.inst}</div>
      <button onclick="GYM_STATE.data.showRule=false;renderRegla()" style="margin-top:10px;padding:8px 20px;border-radius:10px;border:1px solid ${g.color};background:linear-gradient(135deg,${g.color}cc,${g.color}88);color:#fff;font-weight:700;font-size:13px;font-family:inherit">¡Entendido!</button>
    </div>`
    :`<div style="text-align:center">

      <div style="display:flex;gap:12px;justify-content:center">
        <button onclick="chooseRegla('left')" style="flex:1;max-width:120px;padding:14px;border-radius:12px;border:1px solid #a78bfa;background:linear-gradient(135deg,#a78bfacc,#a78bfa88);color:#fff;font-weight:800;font-size:14px;font-family:inherit">← Izquierda</button>
        <button onclick="chooseRegla('right')" style="flex:1;max-width:120px;padding:14px;border-radius:12px;border:1px solid #22d3ee;background:linear-gradient(135deg,#22d3eecc,#22d3ee88);color:#fff;font-weight:800;font-size:14px;font-family:inherit">Derecha →</button>
      </div>
      <div style="font-size:11px;color:#4b5070;margin-top:10px">${trial}/${TOTAL} · racha: ${streak}</div>
    </div>`;
  document.getElementById('screen').innerHTML=gymShell(g.name,g.color,score,errors,5,rule+1,`Regla: ${r.label}`,content+`${fb?`<div style="text-align:center;font-size:28px;margin-top:8px">${fb}</div>`:''}`);
}
function chooseRegla(side){
  const {card,rule,streak,trial}=GYM_STATE.data;
  const ok=card.cat[RC_RULES[rule].id]===side;
  if(ok){
    const ns=streak+1;GYM_STATE.score+=10+(ns>3?5:0);GYM_STATE.data.streak=ns;GYM_STATE.data.fb='✅';
    if(ns>0&&ns%6===0){const nr=(rule+1)%RC_RULES.length;GYM_STATE.data.rule=nr;GYM_STATE.data.streak=0;GYM_STATE.data.showRule=true;}
  } else {GYM_STATE.errors++;GYM_STATE.data.streak=0;GYM_STATE.data.fb='❌';}
  const t=trial+1;GYM_STATE.data.trial=t;
  renderRegla();
  setTimeout(()=>{
    GYM_STATE.data.fb='';
    if(t>=24||GYM_STATE.errors>=5){finishGame(GYM_STATE.score);return;}
    GYM_STATE.data.showRule=false;nextReglaCard();
  },500);
}

  {q:"¿Cuál es fruta?",a:"Silla",b:"Mango",correct:"b"},{q:"¿Cuál es fruta?",a:"Pera",b:"Libro",correct:"a"},
  {q:"¿Cuál es color?",a:"Azul",b:"Correr",correct:"a"},{q:"¿Cuál es número?",a:"Once",b:"Verde",correct:"a"},
  {q:"¿Es vocal?",a:"E",b:"",correct:"yes",type:"bool"},{q:"¿Es vocal?",a:"K",b:"",correct:"no",type:"bool"},
  {q:"¿Cuál es mayor?",a:"15",b:"9",correct:"a"},{q:"¿Cuál es mayor?",a:"2",b:"11",correct:"b"},
];
function runDecision(){
  GYM_STATE.data={items:shuffle(DEC_ITEMS),idx:0,start:Date.now(),fb:''};
  GYM_STATE.score=0;GYM_STATE.errors=0;renderDecision();
}
function renderDecision(){
  const {items,idx,fb}=GYM_STATE.data;const {score,errors}=GYM_STATE;
  const g=GAMES_DATA.find(x=>x.id==='decision');
  if(idx>=items.length){finishGame(score);return;}
  const item=items[idx];
  const btns=item.type==='bool'
    ?`<div style="font-size:52px;margin-bottom:24px;color:#f1f5f9;font-weight:900;font-family:'Clash Display',sans-serif">${item.a}</div>
      <div style="display:flex;gap:14px;justify-content:center">
        <button onclick="answerDec('yes')" style="flex:1;max-width:140px;padding:22px 12px;border-radius:14px;border:1px solid #4ade80;background:linear-gradient(135deg,#4ade80cc,#4ade8088);color:#fff;font-weight:800;font-size:18px;font-family:inherit;box-shadow:0 0 20px #4ade8044">✅ Sí</button>
        <button onclick="answerDec('no')"  style="flex:1;max-width:140px;padding:22px 12px;border-radius:14px;border:1px solid #f87171;background:linear-gradient(135deg,#f87171cc,#f8717188);color:#fff;font-weight:800;font-size:18px;font-family:inherit;box-shadow:0 0 20px #f8717144">❌ No</button>
      </div>`
    :`<div style="display:flex;gap:14px;justify-content:center">
      <button onclick="answerDec('a')" style="flex:1;max-width:150px;padding:26px 12px;border-radius:14px;border:1px solid #a78bfa;background:linear-gradient(135deg,#a78bfacc,#a78bfa88);color:#fff;font-weight:900;font-size:24px;font-family:'Clash Display',sans-serif;box-shadow:0 0 20px #a78bfa44">${item.a}</button>
      <button onclick="answerDec('b')" style="flex:1;max-width:150px;padding:26px 12px;border-radius:14px;border:1px solid #22d3ee;background:linear-gradient(135deg,#22d3eecc,#22d3ee88);color:#fff;font-weight:900;font-size:24px;font-family:'Clash Display',sans-serif;box-shadow:0 0 20px #22d3ee44">${item.b}</button>
    </div>`;
  document.getElementById('screen').innerHTML=gymShell(g.name,g.color,score,errors,5,idx+1,undefined,
    `<div style="text-align:center">
      <div style="font-size:16px;color:${g.color};font-weight:700;margin-bottom:20px;background:${g.color}18;padding:10px 20px;border-radius:20px;display:inline-block">${item.q}</div>
      ${btns}
      ${fb?`<div style="font-size:32px;margin-top:16px">${fb}</div>`:''}
    </div>`);
  GYM_STATE.data.start=Date.now();
}
function answerDec(ans){
  const {items,idx,start}=GYM_STATE.data;
  const elapsed=Date.now()-start;
  const item=items[idx];
  const ok=item.type==='bool'?(item.correct==='yes')===(ans==='yes'):ans===item.correct;
  if(ok){const pts=Math.max(5,30-Math.floor(elapsed/100));GYM_STATE.score+=pts;GYM_STATE.data.fb='✅';}
  else{GYM_STATE.errors++;GYM_STATE.data.fb='❌';}
  GYM_STATE.data.idx=idx+1;
  renderDecision();
  if(GYM_STATE.errors>=5){setTimeout(()=>finishGame(GYM_STATE.score),600);return;}
  setTimeout(()=>{GYM_STATE.data.fb='';renderDecision();},600);
}
